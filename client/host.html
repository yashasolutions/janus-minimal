<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Janus Webinar - Host (Publisher)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; margin: 16px; }
    video { width: 480px; max-width: 100%; background: #111; border-radius: 8px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    button { padding: 8px 12px; }
    pre { white-space: pre-wrap; background: #f6f6f6; padding: 12px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Host (Publisher)</h1>

  <div class="row">
    <button id="start">Start publishing</button>
    <button id="stop" disabled>Stop</button>
    <label>Room:
      <input id="room" type="number" value="1234" style="width:100px" />
    </label>
  </div>

  <p>Local preview:</p>
  <video id="local" autoplay playsinline muted></video>

  <h3>Log</h3>
  <pre id="log"></pre>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/webrtc-adapter/8.2.3/adapter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/janus-gateway@1.2.4/janus.min.js"></script>
  <script>
    var wsServer = "ws://localhost:8188";
    var logEl = document.getElementById("log");
    var localVideo = document.getElementById("local");
    var startBtn = document.getElementById("start");
    var stopBtn = document.getElementById("stop");
    var roomEl = document.getElementById("room");

    var janus = null;
    var pluginHandle = null;
    var localStream = null;
    var myId = null;

    function log() {
      var args = Array.prototype.slice.call(arguments);
      logEl.textContent += args.map(function(a) {
        return typeof a === "string" ? a : JSON.stringify(a, null, 2);
      }).join(" ") + "\n";
      logEl.scrollTop = logEl.scrollHeight;
    }

    function cleanup() {
      try {
        if (localStream) {
          localStream.getTracks().forEach(function(t) { t.stop(); });
        }
      } catch (e) {}
      localStream = null;
      localVideo.srcObject = null;

      try {
        if (pluginHandle) pluginHandle.hangup();
      } catch (e) {}
      pluginHandle = null;

      try {
        if (janus) janus.destroy();
      } catch (e) {}
      janus = null;

      myId = null;
      stopBtn.disabled = true;
      startBtn.disabled = false;
    }

    function ensureRoom(room, callback) {
      pluginHandle.send({
        message: {
          request: "create",
          room: room,
          description: "webinar",
          publishers: 1
        },
        success: function(result) {
          log("Room create result:", result);
          callback(true);
        },
        error: function(err) {
          log("Room create error (often ok):", err);
          callback(false);
        }
      });
    }

    function start() {
      startBtn.disabled = true;
      stopBtn.disabled = false;

      var room = Number(roomEl.value) || 1234;

      Janus.init({
        debug: "all",
        callback: function() {
          janus = new Janus({
            server: wsServer,
            success: function() {
              log("Janus connected:", wsServer);

              janus.attach({
                plugin: "janus.plugin.videoroom",
                success: function(handle) {
                  pluginHandle = handle;
                  log("Attached to videoroom. Handle id:", pluginHandle.getId());

                  ensureRoom(room, function() {
                    pluginHandle.send({
                      message: { request: "join", room: room, ptype: "publisher", display: "HOST" }
                    });
                  });
                },
                error: function(err) {
                  log("Attach error:", err);
                  cleanup();
                },
                onmessage: function(msg, jsep) {
                  var event = msg ? msg.videoroom : null;
                  if (event) log("Event:", msg);

                  if (event === "joined") {
                    myId = msg.id;
                    log("Joined as publisher. My publisher id:", myId);

                    pluginHandle.createOffer({
                      tracks: [
                        { type: "audio", capture: true, recv: false },
                        { type: "video", capture: true, recv: false }
                      ],
                      success: function(jsepOffer) {
                        pluginHandle.send({
                          message: { request: "configure", audio: true, video: true },
                          jsep: jsepOffer
                        });
                        log("Publishing...");
                      },
                      error: function(err) {
                        log("createOffer error:", err);
                        cleanup();
                      }
                    });
                  }

                  if (jsep) {
                    pluginHandle.handleRemoteJsep({ jsep: jsep });
                  }
                },
                webrtcState: function(on) {
                  log("WebRTC state:", on ? "up" : "down");
                },
                onlocaltrack: function(track, on) {
                  log("Local track:", track.kind, on ? "added" : "removed");
                  if (on && track.kind === "video") {
                    if (!localStream) {
                      localStream = new MediaStream();
                    }
                    localStream.addTrack(track);
                    localVideo.srcObject = localStream;
                  } else if (on && track.kind === "audio") {
                    if (!localStream) {
                      localStream = new MediaStream();
                    }
                    localStream.addTrack(track);
                  }
                },
                oncleanup: function() {
                  log("Cleanup notification from Janus");
                }
              });
            },
            error: function(err) {
              log("Janus error:", err);
              cleanup();
            },
            destroyed: function() {
              log("Janus destroyed");
              cleanup();
            }
          });
        }
      });
    }

    startBtn.addEventListener("click", function() {
      try {
        start();
      } catch (e) {
        log("Start error (raw):", String(e));
        log("Start error name:", e ? e.name : "");
        log("Start error message:", e ? e.message : "");
        log("Start error stack:", e ? e.stack : "");
        console.error(e);
        cleanup();
      }
    });
    stopBtn.addEventListener("click", function() { cleanup(); });
    window.addEventListener("beforeunload", function() { cleanup(); });
  </script>
</body>
</html>
