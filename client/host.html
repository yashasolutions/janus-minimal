<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Janus Webinar - Host (Publisher)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; margin: 16px; }
    video { width: 480px; max-width: 100%; background: #111; border-radius: 8px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    button { padding: 8px 12px; }
    pre { white-space: pre-wrap; background: #f6f6f6; padding: 12px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Host (Publisher)</h1>

  <div class="row">
    <button id="start">Start publishing</button>
    <button id="stop" disabled>Stop</button>
    <label>Room:
      <input id="room" type="number" value="1234" style="width:100px" />
    </label>
  </div>

  <p>Local preview:</p>
  <video id="local" autoplay playsinline muted></video>

  <h3>Log</h3>
  <pre id="log"></pre>

  <script src="https://cdn.jsdelivr.net/npm/webrtc-adapter@8.2.3/out/adapter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/janus-gateway@1.2.2/npm/janus.js"></script>
  <script>
    const wsServer = "ws://localhost:8188";
    const logEl = document.getElementById("log");
    const localVideo = document.getElementById("local");
    const startBtn = document.getElementById("start");
    const stopBtn = document.getElementById("stop");
    const roomEl = document.getElementById("room");

    let janus = null;
    let pluginHandle = null;
    let localStream = null;
    let myId = null;

    function log(...args) {
      logEl.textContent += args.map(a => (typeof a === "string" ? a : JSON.stringify(a, null, 2))).join(" ") + "\n";
      logEl.scrollTop = logEl.scrollHeight;
    }

    function cleanup() {
      try { if (localStream) localStream.getTracks().forEach(t => t.stop()); } catch {}
      localStream = null;
      localVideo.srcObject = null;

      try { if (pluginHandle) pluginHandle.hangup(); } catch {}
      pluginHandle = null;

      try { if (janus) janus.destroy(); } catch {}
      janus = null;

      myId = null;
      stopBtn.disabled = true;
      startBtn.disabled = false;
    }

    function ensureRoom(room) {
      return new Promise((resolve) => {
        pluginHandle.send({
          message: {
            request: "create",
            room,
            description: "webinar",
            publishers: 1
          },
          success: (result) => {
            log("Room create result:", result);
            resolve(true);
          },
          error: (err) => {
            log("Room create error (often ok):", err);
            resolve(false);
          }
        });
      });
    }

    async function start() {
      startBtn.disabled = true;
      stopBtn.disabled = false;

      const room = Number(roomEl.value) || 1234;

      Janus.init({
        debug: "all",
        callback: () => {
          janus = new Janus({
            server: wsServer,
            success: () => {
              log("Janus connected:", wsServer);

              janus.attach({
                plugin: "janus.plugin.videoroom",
                success: async (handle) => {
                  pluginHandle = handle;
                  log("Attached to videoroom. Handle id:", pluginHandle.getId());

                  await ensureRoom(room);

                  pluginHandle.send({
                    message: { request: "join", room, ptype: "publisher", display: "HOST" }
                  });
                },
                error: (err) => {
                  log("Attach error:", err);
                  cleanup();
                },
                onmessage: async (msg, jsep) => {
                  const event = msg?.videoroom;
                  if (event) log("Event:", msg);

                  if (event === "joined") {
                    myId = msg.id;
                    log("Joined as publisher. My publisher id:", myId);

                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                    localVideo.srcObject = localStream;

                    pluginHandle.createOffer({
                      tracks: [
                        { type: "audio", capture: true, recv: false },
                        { type: "video", capture: true, recv: false }
                      ],
                      success: (jsepOffer) => {
                        pluginHandle.send({
                          message: { request: "configure", audio: true, video: true },
                          jsep: jsepOffer
                        });
                        log("Publishing...");
                      },
                      error: (err) => {
                        log("createOffer error:", err);
                        cleanup();
                      }
                    });
                  }

                  if (jsep) {
                    pluginHandle.handleRemoteJsep({ jsep });
                  }
                },
                webrtcState: (on) => log("WebRTC state:", on ? "up" : "down"),
                onlocaltrack: (track, on) => {
                  log("Local track:", track.kind, on ? "added" : "removed");
                },
                oncleanup: () => log("Cleanup notification from Janus")
              });
            },
            error: (err) => {
              log("Janus error:", err);
              cleanup();
            },
            destroyed: () => {
              log("Janus destroyed");
              cleanup();
            }
          });
        }
      });
    }

    startBtn.addEventListener("click", () => start().catch(e => {
      log("Start error (raw):", String(e));
      log("Start error name:", e?.name);
      log("Start error message:", e?.message);
      log("Start error stack:", e?.stack);
      console.error(e);
      cleanup();
    }));
    stopBtn.addEventListener("click", () => cleanup());
    window.addEventListener("beforeunload", () => cleanup());
  </script>
</body>
</html>
