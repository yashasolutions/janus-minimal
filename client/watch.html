<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Janus Webinar - Watch (Subscriber)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; margin: 16px; }
    video { width: 720px; max-width: 100%; background: #111; border-radius: 8px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    button { padding: 8px 12px; }
    pre { white-space: pre-wrap; background: #f6f6f6; padding: 12px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Viewer (Subscriber)</h1>

  <div class="row">
    <button id="start">Start watching</button>
    <button id="stop" disabled>Stop</button>
    <label>Room:
      <input id="room" type="number" value="1234" style="width:100px" />
    </label>
  </div>

  <p>Remote stream:</p>
  <video id="remote" autoplay playsinline></video>

  <h3>Log</h3>
  <pre id="log"></pre>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/webrtc-adapter/8.2.3/adapter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/janus-gateway@1.2.4/janus.min.js"></script>
  <script>
    var wsServer = "ws://localhost:8188";
    var logEl = document.getElementById("log");
    var remoteVideo = document.getElementById("remote");
    var startBtn = document.getElementById("start");
    var stopBtn = document.getElementById("stop");
    var roomEl = document.getElementById("room");

    var janus = null;
    var pluginHandle = null;
    var remoteStream = new MediaStream();
    var polling = null;

    function log() {
      var args = Array.prototype.slice.call(arguments);
      logEl.textContent += args.map(function(a) {
        return typeof a === "string" ? a : JSON.stringify(a, null, 2);
      }).join(" ") + "\n";
      logEl.scrollTop = logEl.scrollHeight;
    }

    function cleanup() {
      if (polling) {
        clearInterval(polling);
        polling = null;
      }

      try {
        if (pluginHandle) pluginHandle.hangup();
      } catch (e) {}
      pluginHandle = null;

      try {
        if (janus) janus.destroy();
      } catch (e) {}
      janus = null;

      remoteStream = new MediaStream();
      remoteVideo.srcObject = null;

      stopBtn.disabled = true;
      startBtn.disabled = false;
    }

    function listParticipants(room, successCallback, errorCallback) {
      pluginHandle.send({
        message: { request: "listparticipants", room: room },
        success: function(result) {
          successCallback(result);
        },
        error: function(err) {
          errorCallback(err);
        }
      });
    }

    function waitForPublisherAndJoin(room) {
      log("Waiting for host publisher in room", room, "...");

      polling = setInterval(function() {
        listParticipants(room, function(res) {
          var participants = res && res.participants ? res.participants : [];
          var host = participants[0];
          if (!host) return;

          clearInterval(polling);
          polling = null;

          var feedId = host.id;
          log("Found host:", host);

          pluginHandle.send({
            message: { request: "join", room: room, ptype: "subscriber", feed: feedId }
          });
        }, function(e) {
          log("listparticipants error (often ok while host not started):", e);
        });
      }, 800);
    }

    function start() {
      startBtn.disabled = true;
      stopBtn.disabled = false;

      var room = Number(roomEl.value) || 1234;

      Janus.init({
        debug: "all",
        callback: function() {
          janus = new Janus({
            server: wsServer,
            success: function() {
              log("Janus connected:", wsServer);

              janus.attach({
                plugin: "janus.plugin.videoroom",
                success: function(handle) {
                  pluginHandle = handle;
                  log("Attached to videoroom. Handle id:", pluginHandle.getId ? pluginHandle.getId() : "(n/a)");

                  waitForPublisherAndJoin(room);
                },
                error: function(err) {
                  log("Attach error:", err);
                  cleanup();
                },
                onmessage: function(msg, jsep) {
                  var event = msg ? msg.videoroom : null;
                  if (event) log("Event:", msg);

                  if (jsep) {
                    pluginHandle.createAnswer({
                      jsep: jsep,
                      tracks: [
                        { type: "audio", capture: false, recv: true },
                        { type: "video", capture: false, recv: true }
                      ],
                      success: function(jsepAnswer) {
                        pluginHandle.send({
                          message: { request: "start" },
                          jsep: jsepAnswer
                        });
                        log("Started watching.");
                      },
                      error: function(err) {
                        log("createAnswer error:", err);
                        cleanup();
                      }
                    });
                  }
                },
                onremotetrack: function(track, mid, on) {
                  if (!on) return;
                  log("Remote track:", track.kind, "mid:", mid);

                  remoteStream.addTrack(track);
                  remoteVideo.srcObject = remoteStream;
                },
                webrtcState: function(on) {
                  log("WebRTC state:", on ? "up" : "down");
                },
                oncleanup: function() {
                  log("Cleanup notification from Janus");
                }
              });
            },
            error: function(err) {
              log("Janus error:", err);
              cleanup();
            },
            destroyed: function() {
              log("Janus destroyed");
              cleanup();
            }
          });
        }
      });
    }

    startBtn.addEventListener("click", function() {
      try {
        start();
      } catch (e) {
        log("Start error:", e);
        cleanup();
      }
    });
    stopBtn.addEventListener("click", function() { cleanup(); });
    window.addEventListener("beforeunload", function() { cleanup(); });
  </script>
</body>
</html>
